# InfoLit 資訊判讀遊戲 — Docker Compose
#
# 使用方式：
#   docker compose up --build
#   瀏覽器打開 http://localhost:3000
#
# 預設連線到 host 上的 Ollama。請確保 Ollama 已啟動：
#   ollama serve
#
# 自訂 Ollama 位址或模型：
#   OLLAMA_URL=http://192.168.1.100:11434 MODEL=gemma4 docker compose up --build

services:
  infolit:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - MODEL=${MODEL:-qwen2.5:7b}
      - CONTENT_DIR=/app/content
    # 讓容器能連到 host 上的 Ollama（Linux Docker 20.10+ 需要這行）
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
